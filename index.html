<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Pensum Ingeniería Industrial</title>

<script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>

<style>
body{
font-family: Arial;
background:#f5f5f5;
margin:0;
padding:20px;
}

#network{
width:100%;
height:90vh;
border:1px solid lightgray;
background:white;
}
</style>
</head>

<body>

<h2>Pensum Ingeniería Industrial EAFIT</h2>
<p>Diagrama interactivo de materias y prerrequisitos</p>

<div id="network"></div>

<script>

const nodes = new vis.DataSet([

{ id:1, label:"Probabilidad y Estadística"},
{ id:2, label:"Procesos Estocásticos"},
{ id:3, label:"Investigación de Operaciones"},
{ id:4, label:"Administración de Operaciones"},
{ id:5, label:"Cadena de Suministro"},
{ id:6, label:"Fundamentos de Analítica"},
{ id:7, label:"Analítica Visual"},
{ id:8, label:"Análisis y Procesamiento de Datos"},
{ id:9, label:"Información Financiera"},
{ id:10, label:"Fundamentos de Finanzas"},
{ id:11, label:"Materiales para Ingeniería"},
{ id:12, label:"Ingeniería de Manufactura"},
{ id:13, label:"Física 2"},
{ id:14, label:"Sistemas y Mercados Eléctricos"},
{ id:15, label:"Gestión Humana"},
{ id:16, label:"Excelencia Operacional"},
{ id:17, label:"Gestión Tecnología e Innovación"},
{ id:18, label:"Trayectoria Analítica 1"},
{ id:19, label:"Trayectoria Analítica 2"},
{ id:20, label:"Trayectoria Analítica 3"},
{ id:21, label:"Proyecto Trayectoria Analítica"},
{ id:22, label:"Trayectoria Finanzas 1"},
{ id:23, label:"Trayectoria Finanzas 2"},
{ id:24, label:"Trayectoria Finanzas 3"},
{ id:25, label:"Proyecto Trayectoria Finanzas"},
{ id:26, label:"Proyecto Ingeniería Industrial"},
{ id:27, label:"Pre-práctica"},
{ id:28, label:"Práctica"}

]);

const edges = new vis.DataSet([

{from:1, to:2},
{from:1, to:3},
{from:4, to:5},
{from:8, to:6},
{from:6, to:7},
{from:9, to:10},
{from:11, to:12},
{from:13, to:14},

{from:5, to:18},
{from:18, to:19},
{from:19, to:20},
{from:20, to:21},

{from:10, to:22},
{from:22, to:23},
{from:23, to:24},
{from:24, to:25},

{from:21, to:26},
{from:25, to:26},

{from:26, to:27},
{from:27, to:28}

]);

const container = document.getElementById("network");

const data = {
nodes: nodes,
edges: edges
};

const options = {

nodes:{
shape:"box",
margin:10,
font:{size:16}
},

edges:{
arrows:"to"
},

physics:{
enabled:true
}

};

new vis.Network(container,data,options);

</script>

</body>
</html>
